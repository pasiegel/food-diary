<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Diary — Sign In</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Food Diary">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8">

        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🥗</div>
            <h1 class="text-2xl font-bold text-gray-800">Food Diary</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="username">Username</label>
                <input id="username" type="text" name="username" autofocus autocomplete="username"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-transparent">
            </div>
            <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2.5 rounded-lg transition-colors">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
