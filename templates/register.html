<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Diary — Create Account</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Food Diary">
    <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8">

        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🥗</div>
            <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 text-sm mt-1">Food Diary</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-5">
            {{ success }}
            <a href="/login" class="block mt-2 font-semibold underline">Go to sign in →</a>
        </div>
        {% else %}

        <form method="POST" action="/register/{{ secret }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="username">Username</label>
                <input id="username" type="text" name="username" autofocus autocomplete="username"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent">
                <p class="text-xs text-gray-400 mt-1">3–20 characters · letters, numbers, underscores</p>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="new-password"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent">
                <p class="text-xs text-gray-400 mt-1">At least 8 characters</p>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1.5" for="confirm">Confirm Password</label>
                <input id="confirm" type="password" name="confirm" autocomplete="new-password"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm
                           focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent">
            </div>
            <button type="submit"
                class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2.5 rounded-lg transition-colors">
                Create Account
            </button>
        </form>

        {% endif %}

        <div class="text-center mt-6">
            <a href="/login" class="text-sm text-blue-500 hover:underline">← Back to sign in</a>
        </div>
    </div>
</body>
</html>
